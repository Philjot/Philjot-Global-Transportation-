<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | Philjot Global</title>
    <link rel="stylesheet" href="admin.css"> <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .error { color: red; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2><i class="fa-solid fa-lock"></i> Admin Access</h2>
        <p>Please enter your Philjot Global credentials</p>
        <div id="error-msg" class="error">Invalid Password</div>
        <input type="password" id="admin-pass" placeholder="Enter Admin Password">
        <button onclick="handleLogin()">Login to Dashboard</button>
    </div>

    <script>
        async function handleLogin() {
            const password = document.getElementById('admin-pass').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('http://localhost:5000/api/v1/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    // SAVE THE TOKEN in the browser's memory
                    localStorage.setItem('philjot_token', data.token);
                    // Redirect to the dashboard
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                console.error("Login Error:", err);
            }
        }
    </script>
</body>
</html>
